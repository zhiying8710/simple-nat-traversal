name: package-release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      overwrite_fixed_release:
        description: Replace the shared test-build release from the selected ref
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: package-release-test-build
  cancel-in-progress: true

env:
  RELEASE_TAG: test-build
  STAGING_TAG: test-build-staging-${{ github.run_id }}

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run full test suite
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

  prepare-release:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'main' || github.ref_name == 'master' || (github.event_name == 'workflow_dispatch' && inputs.overwrite_fixed_release)
    steps:
      - name: Create staging draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release delete "${STAGING_TAG}" --cleanup-tag --yes || true
          gh release create "${STAGING_TAG}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "Automated Test Build (staging)" \
            --notes "Staging assets for commit ${GITHUB_SHA}."

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - test
      - prepare-release
    if: needs.prepare-release.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG}"
          COMMIT="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X simple-nat-traversal/internal/buildinfo.Version=${VERSION} -X simple-nat-traversal/internal/buildinfo.Commit=${COMMIT} -X simple-nat-traversal/internal/buildinfo.BuiltAt=${BUILT_AT}"
          DIST="${RUNNER_TEMP}/dist"
          SERVER_DIR="${DIST}/server-linux-amd64"
          CLIENT_DIR="${DIST}/client-linux-amd64"
          mkdir -p "${SERVER_DIR}" "${CLIENT_DIR}"

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o "${SERVER_DIR}/snt-server" ./cmd/snt-server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o "${CLIENT_DIR}/snt" ./cmd/snt

          cp README.md "${SERVER_DIR}/README.md"
          cp docs/DEPLOYMENT.md "${SERVER_DIR}/DEPLOYMENT.md"
          cp examples/server.json "${SERVER_DIR}/server.json"

          cp README.md "${CLIENT_DIR}/README.md"
          cp docs/DEPLOYMENT.md "${CLIENT_DIR}/DEPLOYMENT.md"
          cp docs/USER_GUIDE.md "${CLIENT_DIR}/USER_GUIDE.md"
          cp examples/client-linux.json "${CLIENT_DIR}/client.json"

          tar -C "${DIST}" -czf "${DIST}/server-linux-amd64.tar.gz" server-linux-amd64
          tar -C "${DIST}" -czf "${DIST}/client-linux-amd64.tar.gz" client-linux-amd64

      - name: Upload Linux archives to staging release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "${STAGING_TAG}" \
            "${RUNNER_TEMP}/dist/server-linux-amd64.tar.gz" \
            "${RUNNER_TEMP}/dist/client-linux-amd64.tar.gz" \
            --clobber

  build-macos:
    runs-on: macos-14
    needs:
      - test
      - prepare-release
    if: needs.prepare-release.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG}"
          COMMIT="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X simple-nat-traversal/internal/buildinfo.Version=${VERSION} -X simple-nat-traversal/internal/buildinfo.Commit=${COMMIT} -X simple-nat-traversal/internal/buildinfo.BuiltAt=${BUILT_AT}"
          DIST="${RUNNER_TEMP}/dist"
          TMP_DIR="${RUNNER_TEMP}/macos-universal-build"
          BIN_DIR="${RUNNER_TEMP}/bin-macos-universal"
          mkdir -p "${DIST}" "${TMP_DIR}" "${BIN_DIR}"

          build_macos_gui() {
            local goarch="$1"
            local out="$2"
            local clang_arch
            case "${goarch}" in
              amd64) clang_arch="x86_64" ;;
              arm64) clang_arch="arm64" ;;
              *) echo "unsupported macOS arch: ${goarch}" >&2; exit 1 ;;
            esac
            local sdkroot
            sdkroot="$(xcrun --sdk macosx --show-sdk-path)"
            env \
              SDKROOT="${sdkroot}" \
              CGO_ENABLED=1 \
              GOOS=darwin \
              GOARCH="${goarch}" \
              CC="clang -arch ${clang_arch}" \
              CXX="clang++ -arch ${clang_arch}" \
              CGO_CFLAGS="-arch ${clang_arch}" \
              CGO_CXXFLAGS="-arch ${clang_arch}" \
              CGO_LDFLAGS="-arch ${clang_arch}" \
              go build -ldflags "${LDFLAGS}" -o "${out}" ./cmd/snt-gui
          }

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o "${TMP_DIR}/snt-arm64" ./cmd/snt
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o "${TMP_DIR}/snt-amd64" ./cmd/snt
          build_macos_gui arm64 "${TMP_DIR}/snt-gui-arm64"
          build_macos_gui amd64 "${TMP_DIR}/snt-gui-amd64"

          lipo -create -output "${BIN_DIR}/snt" "${TMP_DIR}/snt-arm64" "${TMP_DIR}/snt-amd64"
          lipo -create -output "${BIN_DIR}/snt-gui" "${TMP_DIR}/snt-gui-arm64" "${TMP_DIR}/snt-gui-amd64"

          chmod +x "${BIN_DIR}/snt" "${BIN_DIR}/snt-gui" ./scripts/package-macos.sh
          ./scripts/package-macos.sh "${VERSION}" "universal" "${BIN_DIR}/snt-gui" "${BIN_DIR}/snt" "${DIST}/client-macos-universal.dmg"

      - name: Upload macOS DMG to staging release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "${STAGING_TAG}" \
            "${RUNNER_TEMP}/dist/client-macos-universal.dmg" \
            --clobber

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
            msystem: MINGW64
            packages: mingw-w64-x86_64-gcc
            cc: gcc
            cxx: g++
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            packages: mingw-w64-clang-aarch64-gcc
            cc: clang
            cxx: clang++
    runs-on: ${{ matrix.runner }}
    needs:
      - test
      - prepare-release
    if: needs.prepare-release.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MinGW for Fyne
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.packages }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Windows binaries
        shell: msys2 {0}
        env:
          MSYSTEM: ${{ matrix.msystem }}
          MSYS2_PATH_TYPE: inherit
        run: |
          set -euo pipefail
          if ! command -v go >/dev/null 2>&1; then
            if [[ -z "${GOROOT:-}" ]]; then
              echo "go is not on PATH and GOROOT is empty" >&2
              exit 1
            fi
            export PATH="$(cygpath -u "${GOROOT}")/bin:${PATH}"
          fi
          go version
          "${{ matrix.cc }}" --version
          "${{ matrix.cxx }}" --version
          VERSION="${RELEASE_TAG}"
          COMMIT="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X simple-nat-traversal/internal/buildinfo.Version=${VERSION} -X simple-nat-traversal/internal/buildinfo.Commit=${COMMIT} -X simple-nat-traversal/internal/buildinfo.BuiltAt=${BUILT_AT}"
          RUNNER_TEMP_UNIX="$(cygpath -u "${RUNNER_TEMP}")"
          BIN_DIR="${RUNNER_TEMP_UNIX}/bin-windows-${{ matrix.arch }}"
          mkdir -p "${BIN_DIR}"

          export CGO_ENABLED=1
          export GOOS=windows
          export GOARCH=${{ matrix.arch }}
          export CC=${{ matrix.cc }}
          export CXX=${{ matrix.cxx }}

          go build -ldflags "${LDFLAGS}" -o "${BIN_DIR}/snt.exe" ./cmd/snt
          go build -ldflags "${LDFLAGS}" -o "${BIN_DIR}/snt-gui.exe" ./cmd/snt-gui

      - name: Package Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = Join-Path $env:RUNNER_TEMP "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          ./scripts/package-windows-installer.ps1 `
            -Version $env:RELEASE_TAG `
            -Arch "${{ matrix.arch }}" `
            -GuiBinary (Join-Path $env:RUNNER_TEMP "bin-windows-${{ matrix.arch }}/snt-gui.exe") `
            -CliBinary (Join-Path $env:RUNNER_TEMP "bin-windows-${{ matrix.arch }}/snt.exe") `
            -OutputFile (Join-Path $dist "client-windows-${{ matrix.arch }}-setup.exe")

      - name: Upload Windows installer to staging release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          gh release upload $env:STAGING_TAG (Join-Path $env:RUNNER_TEMP "dist/client-windows-${{ matrix.arch }}-setup.exe") --clobber

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-linux
      - build-macos
      - build-windows
    if: needs.prepare-release.result == 'success'
    steps:
      - name: Download staged release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${STAGING_TAG}" --dir release-assets

      - name: Replace fixed release from staged assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release delete "${RELEASE_TAG}" --cleanup-tag --yes || true
          gh release create "${RELEASE_TAG}" release-assets/* \
            --target "${GITHUB_SHA}" \
            --title "Automated Test Build" \
            --notes "Auto-packaged from commit ${GITHUB_SHA}."

      - name: Remove staging release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release delete "${STAGING_TAG}" --cleanup-tag --yes || true
