name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run full test suite
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

  build-cli-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux CLI binaries
        shell: bash
        run: |
          set -euo pipefail
          go build ./cmd/snt
          go build ./cmd/snt-server

  build-cli-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows CLI binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          go build ./cmd/snt
          go build ./cmd/snt-server
