<svg width="1820" height="1080" viewBox="0 0 1820 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1820" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EFE4"/>
      <stop offset="1" stop-color="#E7DFD2"/>
    </linearGradient>
    <linearGradient id="hero" x1="280" y1="96" x2="1470" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123245"/>
      <stop offset="1" stop-color="#215C64"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E7844C"/>
      <stop offset="1" stop-color="#D25E38"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#8D7F70" flood-opacity="0.18"/>
    </filter>
    <style>
      .display { font-family: "PingFang SC"; }
      .title { font-size: 40px; font-weight: 700; fill: #102A3A; }
      .subtitle { font-size: 18px; font-weight: 500; fill: #5E6D74; }
      .navTitle { font-size: 16px; font-weight: 700; fill: #EDE8DD; letter-spacing: 0.16em; }
      .navItem { font-size: 20px; font-weight: 600; fill: #C7D1D6; }
      .navItemActive { font-size: 20px; font-weight: 700; fill: #FFFFFF; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #18333D; }
      .cardLabel { font-size: 14px; font-weight: 600; fill: #6A787E; letter-spacing: 0.08em; }
      .cardBody { font-size: 18px; font-weight: 600; fill: #18333D; }
      .metric { font-size: 36px; font-weight: 700; fill: #FFFFFF; }
      .metricLabel { font-size: 14px; font-weight: 600; fill: #A8C0C6; letter-spacing: 0.08em; }
      .bodyLight { font-size: 16px; font-weight: 500; fill: #EEF5F6; }
      .pillText { font-size: 15px; font-weight: 700; fill: #123245; }
      .buttonText { font-size: 16px; font-weight: 700; fill: #102A3A; }
      .buttonTextLight { font-size: 16px; font-weight: 700; fill: #FFFFFF; }
      .mono { font-family: monospace; font-size: 14px; fill: #506168; }
      .noteTitle { font-size: 22px; font-weight: 700; fill: #102A3A; }
      .noteBody { font-size: 16px; font-weight: 500; fill: #47575E; }
      .tiny { font-size: 13px; font-weight: 600; fill: #73858C; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1820" height="1080" fill="url(#bg)"/>
  <circle cx="1480" cy="170" r="180" fill="#EBC9B7" fill-opacity="0.45"/>
  <circle cx="136" cy="950" r="210" fill="#D4E2DB" fill-opacity="0.7"/>

  <rect x="56" y="54" width="1516" height="944" rx="34" fill="#FBF7F1" filter="url(#shadow)"/>
  <rect x="56" y="54" width="228" height="944" rx="34" fill="#112734"/>
  <rect x="284" y="54" width="1288" height="220" rx="34" fill="url(#hero)"/>
  <rect x="308" y="304" width="424" height="232" rx="28" fill="#F3E2D0"/>
  <rect x="756" y="304" width="424" height="232" rx="28" fill="#E3F0EB"/>
  <rect x="1204" y="304" width="344" height="232" rx="28" fill="#FFF7EE"/>
  <rect x="308" y="566" width="748" height="404" rx="28" fill="#FFFDF9"/>
  <rect x="1080" y="566" width="468" height="404" rx="28" fill="#FFFDF9"/>

  <text class="display navTitle" x="92" y="110">SIMPLE NAT TRAVERSAL</text>
  <text class="display" x="92" y="154" font-size="28" font-weight="700" fill="#FFFFFF">简单打洞组网</text>
  <text class="display" x="92" y="182" font-size="14" font-weight="500" fill="#93A7AF">重做提案 v1</text>

  <rect x="78" y="226" width="184" height="66" rx="20" fill="#1D4255"/>
  <circle cx="110" cy="259" r="8" fill="#4CD08F"/>
  <text class="display navItemActive" x="132" y="266">总览驾驶台</text>

  <text class="display navItem" x="92" y="346">设备与节点</text>
  <text class="display navItem" x="92" y="406">发布与绑定</text>
  <text class="display navItem" x="92" y="466">流量与隧道</text>
  <text class="display navItem" x="92" y="526">诊断与日志</text>
  <text class="display navItem" x="92" y="586">设置</text>

  <rect x="78" y="788" width="184" height="154" rx="24" fill="#173747"/>
  <text class="display tiny" x="96" y="828">当前布局问题</text>
  <text class="display" x="96" y="865" font-size="18" font-weight="600" fill="#FFFFFF">多页表单太重</text>
  <text class="display" x="96" y="896" font-size="18" font-weight="600" fill="#FFFFFF">状态信息分裂</text>
  <text class="display" x="96" y="927" font-size="18" font-weight="600" fill="#FFFFFF">中文语境不完整</text>

  <text class="display title" x="318" y="122">把 GUI 改成一块真正能“看住网络”的控制台</text>
  <text class="display bodyLight" x="318" y="162">不再把重点放在配置表单和原始 dump 上，而是把连接状态、远端服务、快速操作和告警放到同一屏里。</text>

  <rect x="318" y="188" width="126" height="38" rx="19" fill="#E7F6EF"/>
  <text class="display pillText" x="350" y="212">已连接 3 台</text>
  <rect x="458" y="188" width="152" height="38" rx="19" fill="#FFF4E8"/>
  <text class="display pillText" x="490" y="212">RDP / TCP 活跃</text>
  <rect x="624" y="188" width="118" height="38" rx="19" fill="#E7EDF6"/>
  <text class="display pillText" x="652" y="212">配置已同步</text>

  <rect x="1280" y="96" width="116" height="44" rx="22" fill="#F5EFE4"/>
  <text class="display buttonText" x="1318" y="124">刷新</text>
  <rect x="1410" y="96" width="116" height="44" rx="22" fill="url(#accent)"/>
  <text class="display buttonTextLight" x="1434" y="124">启动客户端</text>

  <text class="display metricLabel" x="320" y="244">当前网络态势</text>
  <text class="display metric" x="320" y="258">公网 UDP 已稳定，2 条 TCP 隧道在线</text>

  <text class="display cardLabel" x="336" y="340">核心运行态</text>
  <text class="display cardTitle" x="336" y="374">把“现在能不能用”放在最前面</text>
  <text class="display cardBody" x="336" y="418">设备名: zhiying-windows</text>
  <text class="display cardBody" x="336" y="452">服务端: demo.example.com</text>
  <text class="display cardBody" x="336" y="486">自动连接: 已开启</text>
  <rect x="564" y="422" width="132" height="42" rx="21" fill="#112734"/>
  <text class="display buttonTextLight" x="598" y="449">查看详情</text>

  <text class="display cardLabel" x="784" y="340">服务总台</text>
  <text class="display cardTitle" x="784" y="374">发布、发现、绑定在一个操作闭环里</text>
  <text class="display cardBody" x="784" y="418">已发布: rdp/tcp, dns/udp</text>
  <text class="display cardBody" x="784" y="452">发现到: win-b / rdp/tcp</text>
  <text class="display cardBody" x="784" y="486">一键绑定建议: 127.0.0.1:0</text>
  <rect x="1018" y="422" width="124" height="42" rx="21" fill="#215C64"/>
  <text class="display buttonTextLight" x="1048" y="449">快速绑定</text>

  <text class="display cardLabel" x="1228" y="340">告警与日志</text>
  <text class="display cardTitle" x="1228" y="374">右侧永远留给需要你立刻看见的东西</text>
  <text class="display cardBody" x="1228" y="418">最近告警: 1 条</text>
  <text class="display cardBody" x="1228" y="452">重连次数: 0</text>
  <text class="display cardBody" x="1228" y="486">最近刷新: 18:20:16</text>

  <text class="display cardLabel" x="336" y="602">主工作区</text>
  <text class="display cardTitle" x="336" y="636">一个屏幕完成服务配置、检查、执行</text>

  <rect x="336" y="664" width="332" height="276" rx="24" fill="#F7F1E8"/>
  <text class="display cardLabel" x="360" y="694">我发布的服务</text>
  <text class="display cardBody" x="360" y="732">RDP / TCP</text>
  <text class="display mono" x="360" y="760">127.0.0.1:3389</text>
  <rect x="360" y="786" width="122" height="38" rx="19" fill="#FFFFFF"/>
  <text class="display buttonText" x="392" y="811">编辑</text>
  <rect x="496" y="786" width="122" height="38" rx="19" fill="#FFFFFF"/>
  <text class="display buttonText" x="528" y="811">停用</text>
  <rect x="360" y="842" width="284" height="74" rx="18" fill="#FFFFFF"/>
  <text class="display tiny" x="380" y="868">新增服务</text>
  <text class="display" x="380" y="900" font-size="18" font-weight="600" fill="#18333D">协议 / 名称 / 本地地址 三联输入</text>

  <rect x="692" y="664" width="340" height="276" rx="24" fill="#EDF4F0"/>
  <text class="display cardLabel" x="716" y="694">远端服务与绑定</text>
  <text class="display cardBody" x="716" y="732">win-b / rdp / tcp</text>
  <text class="display mono" x="716" y="760">建议绑定到 127.0.0.1:0</text>
  <rect x="716" y="786" width="132" height="38" rx="19" fill="#215C64"/>
  <text class="display buttonTextLight" x="748" y="811">一键绑定</text>
  <rect x="862" y="786" width="146" height="38" rx="19" fill="#FFFFFF"/>
  <text class="display buttonText" x="892" y="811">编辑规则</text>
  <rect x="716" y="842" width="292" height="74" rx="18" fill="#FFFFFF"/>
  <text class="display tiny" x="736" y="868">绑定结果</text>
  <text class="display" x="736" y="900" font-size="18" font-weight="600" fill="#18333D">本机监听地址会直接回填到卡片</text>

  <text class="display cardLabel" x="1108" y="602">侧边情报栏</text>
  <text class="display cardTitle" x="1108" y="636">把“拓扑、告警、日志”收成一个永远可见的右栏</text>

  <rect x="1108" y="664" width="412" height="116" rx="22" fill="#F4E6DA"/>
  <text class="display cardLabel" x="1132" y="694">拓扑快照</text>
  <text class="display" x="1132" y="732" font-size="20" font-weight="700" fill="#18333D">你  →  中继  →  win-b</text>
  <text class="display mono" x="1132" y="760">udp: established / tcp: 2 streams</text>

  <rect x="1108" y="800" width="412" height="72" rx="22" fill="#FFF5F0"/>
  <circle cx="1142" cy="836" r="8" fill="#E26E43"/>
  <text class="display cardBody" x="1164" y="843">最近告警: RDP 关闭握手超时 1 次</text>

  <rect x="1108" y="892" width="412" height="48" rx="22" fill="#122A39"/>
  <text class="display mono" x="1132" y="921" fill="#D6E4E8">18:20:14  tcp_open_ok  bind=win-rdp  peer=win-b</text>

  <rect x="1612" y="54" width="156" height="944" rx="30" fill="#FFF9F1"/>
  <text class="display noteTitle" x="1640" y="108">设计要点</text>

  <circle cx="1658" cy="164" r="16" fill="#112734"/>
  <text class="display" x="1653" y="171" font-size="16" font-weight="700" fill="#FFFFFF">1</text>
  <text class="display noteBody" x="1686" y="170">取消“先选 tab 再找状态”</text>
  <text class="display noteBody" x="1686" y="196">首页直接给运行态、服务、告警。</text>

  <circle cx="1658" cy="272" r="16" fill="#215C64"/>
  <text class="display" x="1653" y="279" font-size="16" font-weight="700" fill="#FFFFFF">2</text>
  <text class="display noteBody" x="1686" y="278">中文信息架构优先</text>
  <text class="display noteBody" x="1686" y="304">把“发布/绑定/发现”写成用户语言。</text>

  <circle cx="1658" cy="380" r="16" fill="#E26E43"/>
  <text class="display" x="1653" y="387" font-size="16" font-weight="700" fill="#FFFFFF">3</text>
  <text class="display noteBody" x="1686" y="386">右侧固定情报栏</text>
  <text class="display noteBody" x="1686" y="412">日志和告警不再藏进深层标签页。</text>

  <text class="display noteTitle" x="1640" y="506">视觉方向</text>
  <rect x="1640" y="534" width="28" height="28" rx="8" fill="#112734"/>
  <rect x="1680" y="534" width="28" height="28" rx="8" fill="#215C64"/>
  <rect x="1720" y="534" width="28" height="28" rx="8" fill="#E7844C"/>
  <rect x="1640" y="576" width="108" height="108" rx="20" fill="#F3E2D0"/>
  <text class="display tiny" x="1640" y="714">纸面感底色 + 深海蓝导航 + 橙色行动按钮</text>

  <text class="display noteTitle" x="1640" y="790">这版先审什么</text>
  <text class="display noteBody" x="1640" y="828">1. 这种“控制台”方向对不对</text>
  <text class="display noteBody" x="1640" y="860">2. 首页信息是否该更偏运维或更偏配置</text>
  <text class="display noteBody" x="1640" y="892">3. 右侧情报栏是否保留常驻</text>
  <text class="display tiny" x="1640" y="948">文件: docs/design/gui-redesign-v1.svg</text>
</svg>
